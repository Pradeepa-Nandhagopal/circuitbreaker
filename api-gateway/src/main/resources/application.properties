spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

management.endpoints.web.exposure.include=*

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/products/**

spring.cloud.gateway.routes[0].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[0].filters[0].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.replenishRate=1
spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.burstCapacity=1

spring.cloud.gateway.routes[1].id=inventory-service
spring.cloud.gateway.routes[1].uri=lb://INVENTORY-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/inventory/**

spring.cloud.gateway.routes[2].id=recommendation-service
spring.cloud.gateway.routes[2].uri=lb://RECOMMENDATION-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/recommendations/**

spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=recommendationCircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/fallback/recommendations

resilience4j.circuitbreaker.instances.recommendationCircuitBreaker.register-health-indicator=true
resilience4j.circuitbreaker.instances.recommendationCircuitBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.recommendationCircuitBreaker.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.recommendationCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.recommendationCircuitBreaker.wait-duration-in-open-state=10s
spring.data.redis.host=localhost
spring.data.redis.port=6379

management.endpoint.gateway.access=unrestricted



logging.level.org.springframework.cloud.gateway.filter.factory.RequestRateLimiterGatewayFilterFactory=TRACE
logging.level.org.springframework.cloud.gateway.filter.ratelimit=TRACE
logging.level.org.springframework.data.redis=DEBUG
logging.level.io.lettuce.core=DEBUG

